<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Master Matteos Jernlog">
<meta name="theme-color" content="#101012">
<link rel="apple-touch-icon" href="icon-180-v1.png">
<link rel="manifest" href="manifest.json">
<title>Master Matteos Jernlog</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#101012;
    --bg-elevated:#1b1b1e;
    --bg-card:#202024;
    --border:#2e2e33;
    --text:#f2f2f0;
    --text-dim:#9a9aa2;
    --yellow:#f5c518;
    --yellow-dim:#8a7215;
    --red:#e5484d;
    --green:#3ecf8e;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  /* LØSNING PÅ DEN SORTE BUNDBJÆLKE (fundet via bundtest.html/bundtest2.html, 15/7-2026):
     Årsagen var en WebKit-fejl i standalone-tilstand med statusbar-stilen "black-translucent":
     layout-vinduet blev gjort 59pt for kort (statusbar-højden) men tegnet fra skærmens top, så
     de 59pt manglede i BUNDEN — udenfor rækkevidde af al CSS. Fixet er statusbar-stil "black"
     i <head> (kræver at hjemmeskærms-genvejen slettes og tilføjes igen for at træde i kraft).
     html/body-baggrunden er sat til --bg (samme som header), så et evt. statusbar-underlap i
     toppen matcher headeren. Bunden ligger nu INDE i vinduet og males af bundnav'en selv. */
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;height:100%;height:-webkit-fill-available;overflow:hidden;overscroll-behavior-y:none;}

  /* App-skal: header og bundnav er faste, kun <main> scroller. position:fixed + inset:0 (i stedet for
     height:100dvh) sikrer at app'en altid dækker HELE skærmen præcist, også på iPhones tilføjet til
     hjemmeskærmen, hvor dvh-baseret højde nogle gange efterlader en lille sort stribe nederst. */
  .app{position:fixed;inset:0;max-width:520px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg-elevated);}

  /* Bundnavigation — almindeligt element nederst i flex-kolonnen, ikke "fixed".
     max(...,12px) sikrer et minimum af baggrund under ikonerne selv hvis env() skulle give 0. */
  .bottom-nav{flex:0 0 auto;background:var(--bg-elevated);border-top:1px solid var(--border);display:flex;padding-bottom:max(env(safe-area-inset-bottom),8px);}
  /* Knap-rækken er gjort højere (mere padding + større ikon/tekst) end før, så selve knapperne
     fylder mere af det nederste område — iOS reserverer stadig en lille strimmel til
     "swipe hjem"-bevægelsen (der kan ikke sidde knapper der), men jo mere plads knapperne selv
     fylder, jo mindre af skærmen ser ud som "tomt" rum nedenunder. */
  .bn-item{flex:1;background:none;border:none;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:14px 2px 18px;font-family:inherit;}
  .bn-ic{font-size:25px;line-height:1;}
  .bn-label{font-size:11px;font-weight:700;white-space:nowrap;}
  .bn-item.active{color:var(--yellow);}
  .bn-item:active{background:var(--bg-card);}
  button, input, select{font-family:inherit;}

  /* Top bar */
  header.topbar{flex:0 0 auto;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));}
  header.topbar .title{font-size:16px;font-weight:800;letter-spacing:0.3px;color:var(--yellow);display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  header.topbar .title .dot{width:10px;height:10px;border-radius:50%;background:var(--red);}
  .menu-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:12px;font-size:20px;display:flex;align-items:center;justify-content:center;}
  .menu-btn:active{background:var(--yellow-dim);}

  /* Dropdown menu */
  .menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;}
  .menu-overlay.open{display:block;}
  .menu-panel{position:absolute;top:calc(70px + env(safe-area-inset-top));right:16px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-width:240px;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .menu-item{display:flex;align-items:center;gap:12px;padding:16px 18px;font-size:16px;font-weight:600;border-bottom:1px solid var(--border);}
  .menu-item:last-child{border-bottom:none;}
  .menu-item:active{background:var(--bg-card);}
  .menu-item .ic{font-size:18px;width:22px;text-align:center;}
  .menu-item.active{color:var(--yellow);}
  .menu-item .req-dot{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}

  main{padding:16px;flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);}

  /* Generic */
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .muted{color:var(--text-dim);font-size:13px;}
  h2.section{font-size:15px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:22px 0 10px;}
  h2.section:first-child{margin-top:0;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:14px 18px;border-radius:12px;font-size:16px;font-weight:700;width:100%;}
  .btn:active{transform:scale(0.98);}
  .btn.primary{background:var(--yellow);color:#141400;border-color:var(--yellow);}
  .btn.danger{background:transparent;color:var(--red);border-color:var(--red);}
  .btn.ghost{background:transparent;}
  .btn.small{padding:10px 14px;font-size:14px;width:auto;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  input[type=text], input[type=number], input[type=email], input[type=password]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:14px;border-radius:12px;font-size:16px;}
  input:focus{outline:none;border-color:var(--yellow);}
  label.field-label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  .field{margin-bottom:14px;}

  /* Search */
  .search-wrap{position:relative;}
  .search-results{margin-top:8px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg-elevated);}
  .search-result-item{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:active{background:var(--bg-card);}
  .search-result-item .bw-tag{font-size:11px;color:var(--text-dim);border:1px solid var(--border);padding:2px 6px;border-radius:6px;}
  .add-new-row{padding:14px;color:var(--yellow);font-weight:700;display:flex;align-items:center;gap:8px;}

  /* Position toggle */
  .toggle-group{display:flex;gap:8px;}
  .toggle-opt{flex:1;text-align:center;padding:12px 6px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;color:var(--text-dim);}
  .toggle-opt.selected{background:var(--yellow);color:#141400;border-color:var(--yellow);}

  /* PR / trend badges */
  .pr-badge{background:var(--green);color:#062617;font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:4px;}
  .trend{font-size:13px;font-weight:700;}
  .trend.up{color:var(--green);}
  .trend.down{color:var(--red);}
  .trend.same{color:var(--text-dim);}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:calc(84px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--red);color:#fff;padding:14px 20px;border-radius:14px;font-weight:800;font-size:15px;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:200;display:none;max-width:90vw;text-align:center;}
  .toast.show{display:block;animation:pop 0.25s ease-out;}
  .toast.pr{background:var(--green);color:#062617;}
  @keyframes pop{from{transform:translate(-50%,10px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}

  /* Set list */
  .set-line{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .set-line:last-child{border-bottom:none;}
  .set-line .set-meta{font-size:13px;color:var(--text-dim);}
  .set-actions{display:flex;gap:6px;}
  .icon-btn{background:none;border:none;color:var(--text-dim);font-size:16px;padding:6px;}
  .icon-btn.edit:active{color:var(--yellow);}
  .icon-btn.del:active{color:var(--red);}
  .skift-ex-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;font-size:10.5px;line-height:1.2;font-weight:700;padding:3px 10px;text-align:center;}
  .skift-ex-btn:active{background:var(--yellow-dim);color:var(--text);}

  .session-block{margin-bottom:16px;}
  .session-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .session-date{font-weight:800;font-size:15px;}

  /* Exercise list rows (history/program) */
  .list-row{display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--border);}
  .list-row:last-child{border-bottom:none;}
  .list-row:active{background:var(--bg-elevated);}
  .list-row .name{font-weight:700;font-size:15px;}
  .chev{color:var(--text-dim);}

  /* Back button */
  .back-btn{display:flex;align-items:center;gap:6px;color:var(--yellow);font-weight:700;margin-bottom:14px;font-size:15px;}

  /* Graph */
  svg.graph{width:100%;height:160px;display:block;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;display:none;align-items:flex-end;}
  .modal-overlay.open{display:flex;}
  .modal-sheet{background:var(--bg-elevated);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;}
  .modal-sheet h3{margin-top:0;}

  .empty-state{text-align:center;padding:30px 10px;color:var(--text-dim);}
  .fab-hint{font-size:13px;color:var(--text-dim);text-align:center;margin-top:6px;}

  .day-title{font-size:18px;font-weight:800;margin:0 0 4px;}
  .train-tag{display:inline-block;background:var(--yellow);color:#141400;font-weight:800;font-size:12px;padding:2px 8px;border-radius:8px;margin-bottom:8px;}

  /* Reps wheel picker */
  .reps-picker-wrap{position:relative;height:64px;margin-bottom:4px;}
  .reps-picker-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;height:100%;align-items:center;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .reps-picker-track::-webkit-scrollbar{display:none;}
  .reps-item{scroll-snap-align:center;flex:0 0 56px;text-align:center;font-size:20px;font-weight:700;color:var(--text-dim);display:flex;align-items:center;justify-content:center;height:100%;transition:font-size 0.1s, color 0.1s;}
  .reps-item.active{color:var(--yellow);font-size:30px;}
  .reps-pad{flex:0 0 calc(50% - 28px);}
  .reps-picker-indicator{position:absolute;left:50%;top:4px;bottom:4px;width:56px;margin-left:-28px;border-top:2px solid var(--yellow);border-bottom:2px solid var(--yellow);pointer-events:none;border-radius:6px;}
  .mode-toggle-link{text-align:center;font-size:13px;color:var(--yellow);font-weight:700;padding:8px 0 2px;}

  /* Login */
  .login-wrap{padding:30px 4px 10px;}
  .login-logo{text-align:center;font-size:40px;margin-bottom:6px;}
  .login-title{text-align:center;font-size:22px;font-weight:800;color:var(--yellow);margin-bottom:4px;}
  .login-sub{text-align:center;color:var(--text-dim);font-size:14px;margin-bottom:22px;}
  .login-switch{text-align:center;color:var(--yellow);font-weight:700;font-size:14px;padding:14px 0 4px;}

  /* Feed */
  .feed-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
  .feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--yellow);color:#141400;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex:0 0 38px;}
  .feed-who{font-weight:800;font-size:15px;}
  .feed-when{color:var(--text-dim);font-size:12px;margin-top:2px;}
  .feed-date-badge{display:inline-block;background:var(--bg-card);color:var(--text);font-weight:800;font-size:12px;padding:3px 9px;border-radius:8px;letter-spacing:0.2px;}
  .feed-ex-line{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .feed-ex-line:last-child{border-bottom:none;}
  .feed-ex-name{font-weight:700;font-size:14px;}
  .feed-ex-sets{color:var(--text-dim);font-size:13px;text-align:right;flex-shrink:0;max-width:55%;}
  .feed-comments-label{font-size:12px;font-weight:800;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;}
  .comment-line{display:flex;gap:8px;padding:7px 0;font-size:14px;align-items:baseline;}
  .comment-author{font-weight:800;color:var(--yellow);flex-shrink:0;}
  .comment-body{word-break:break-word;flex:1;}
  .comment-date{color:var(--text-dim);font-size:11px;flex-shrink:0;margin-left:auto;white-space:nowrap;}
  .comment-input-row{display:flex;gap:8px;margin-top:10px;}
  .comment-input-row input{flex:1;padding:11px 14px;font-size:15px;}
  .comment-send{background:var(--yellow);color:#141400;border:none;border-radius:12px;font-weight:800;font-size:14px;padding:0 16px;}

  /* Friends */
  .friend-status{font-size:12px;color:var(--text-dim);border:1px solid var(--border);border-radius:8px;padding:3px 8px;}
  .pill-btn{background:var(--yellow);color:#141400;border:none;border-radius:10px;font-weight:800;font-size:13px;padding:9px 14px;}
  .pill-btn.ghost{background:transparent;color:var(--red);border:1px solid var(--red);}
  .pill-btn.dim{background:var(--bg-elevated);color:var(--text-dim);border:1px solid var(--border);}

  /* Kalender */
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cal-title{font-weight:800;font-size:16px;}
  .cal-sub{font-size:12px;color:var(--text-dim);}
  .cal-nav{display:flex;gap:8px;}
  .cal-nav button{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:10px;font-size:17px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--text-dim);font-weight:700;padding:2px 0;}
  .cal-day{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:13px;color:var(--text-dim);background:var(--bg-elevated);border:1px solid transparent;}
  .cal-day.out{visibility:hidden;}
  .cal-day.trained{background:var(--yellow);color:#141400;font-weight:800;}
  .cal-day.today{border-color:var(--yellow);}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;}
  .stat-num{font-size:22px;font-weight:800;color:var(--yellow);}
  .stat-label{font-size:11px;color:var(--text-dim);margin-top:2px;}

  /* Live-badge i feed */
  .live-badge{background:var(--green);color:#0b2b1c;font-size:12px;font-weight:800;padding:3px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:#0b2b1c;animation:blink 1.2s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.25;}}

  /* Kommentar-side */
  .conv-title{font-weight:800;font-size:14px;margin-bottom:2px;}
  .conv-when{color:var(--text-dim);font-size:12px;margin-bottom:8px;}
  .new-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:6px;}

  /* Hvordan-links på øvelsesside */
  .howto-row{display:flex;gap:10px;margin:10px 0 14px;}
  .howto-link{flex:1;text-align:center;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:11px 8px;color:var(--yellow);font-weight:700;font-size:13px;text-decoration:none;}

  /* Træk-og-slip rækkefølge på Øvelser-siden */
  .reorder-list .list-row{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  .list-row.dragging{opacity:0.75;background:var(--bg-elevated);outline:2px solid var(--yellow);border-radius:10px;position:relative;z-index:10;}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="title" id="appTitleBtn" style="cursor:pointer;"><span class="dot"></span> Master Matteos Jernlog-app</div>
    <button class="menu-btn" id="menuBtn" style="display:none;">☰</button>
  </header>

  <div class="menu-overlay" id="menuOverlay">
    <div class="menu-panel">
      <div class="menu-item" data-view="comments"><span class="ic">💬</span> Kommentarer <span class="req-dot" id="commentDot" style="display:none;">0</span></div>
      <div class="menu-item" data-view="exercises"><span class="ic">📋</span> Øvelser</div>
      <div class="menu-item" data-view="friends"><span class="ic">👥</span> Venner <span class="req-dot" id="friendReqDot" style="display:none;">0</span></div>
      <div class="menu-item" data-view="admin" id="menuAdminItem" style="display:none;"><span class="ic">🛡️</span> Godkend brugere <span class="req-dot" id="adminReqDot" style="display:none;">0</span></div>
      <div class="menu-item" id="menuLogout"><span class="ic">🚪</span> Log ud <span class="muted" id="menuUser" style="margin-left:auto;font-size:12px;"></span></div>
      <div style="padding:8px 18px;font-size:11px;color:var(--text-dim);text-align:right;">version 15.7-C</div>
    </div>
  </div>

  <main id="main"></main>

  <nav class="bottom-nav" id="bottomNav" style="display:none;">
    <button class="bn-item" data-view="feed"><span class="bn-ic">📣</span><span class="bn-label">Feed</span></button>
    <button class="bn-item" data-view="calendar"><span class="bn-ic">📅</span><span class="bn-label">Kalender</span></button>
    <button class="bn-item" data-view="log"><span class="bn-ic">🏋️</span><span class="bn-label">Log øvelse</span></button>
    <button class="bn-item" data-view="history"><span class="bn-ic">📈</span><span class="bn-label">Historik</span></button>
    <button class="bn-item" data-view="dig"><span class="bn-ic">🙂</span><span class="bn-label">Dig</span></button>
  </nav>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<div class="toast" id="toast"></div>

function uid(prefix){ return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,9); }
function todayISO(){ var d=new Date(); return d.toISOString().slice(0,10); }
function fmtDateDisplay(iso){
  var today = todayISO();
  var y = new Date(); y.setDate(y.getDate()-1); var yesterday = y.toISOString().slice(0,10);
  if(iso === today) return "I dag";
  if(iso === yesterday) return "I går";
  var d = new Date(iso+"T00:00:00");
  var months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  return d.getDate()+". "+months[d.getMonth()]+" "+d.getFullYear();
}
function fmtClock(ms){
  var d = new Date(ms);
  function p(n){ return (n<10?"0":"")+n; }
  return p(d.getHours())+":"+p(d.getMinutes());
}
function fmtCommentDate(iso){
  if(!iso) return "";
  var d = new Date(iso);
  if(isNaN(d.getTime())) return "";
  var dateOnly = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  return fmtDateDisplay(dateOnly);
}
/* Fælles "hvornår"-blok for et træningskort (feed + Dig): datoen vises som en
   tydelig lille badge for sig selv, resten (klokkeslæt/varighed/øvelser) står
   under i dæmpet tekst — så det er lettere at se med det samme hvilken dag en
   træning er fra, i stedet for at alt står i én rodet linje. */
function renderWhenHtml(w, isLive){
  var dateIso = new Date(w.start).toISOString().slice(0,10);
  var durMin = Math.round((w.end - w.start)/60000);
  var dateLabel = isLive ? "I dag" : fmtDateDisplay(dateIso);
  var restTxt;
  if(isLive){
    restTxt = "Startede kl. "+fmtClock(w.start)+" · "+w.exercises.length+" øvelse"+(w.exercises.length===1?"":"r")+" indtil videre";
  } else {
    restTxt = fmtClock(w.start) + (durMin>0 ? ("–"+fmtClock(w.end)+" · "+durMin+" min") : "") + " · " + w.exercises.length + " øvelse" + (w.exercises.length===1?"":"r");
  }
  return '<div class="feed-date-badge">'+escapeHtml(dateLabel)+'</div><div class="feed-when">'+escapeHtml(restTxt)+'</div>';
}
function parseWeight(str){
  if(str===null||str===undefined||str==="") return null;
  var n = parseFloat(String(str).replace(",","."));
  return isNaN(n) ? null : n;
}
function parseReps(raw){
  if(raw===null||raw===undefined) return null;
  raw = String(raw).trim();
  if(raw==="") return null;
  var rangeMatch = raw.match(/^(\d+)\s*-\s*(\d+)$/);
  if(rangeMatch){
    var a = parseInt(rangeMatch[1],10), b = parseInt(rangeMatch[2],10);
    if(a>b){ var t=a; a=b; b=t; }
    var mid = Math.floor((a+b)/2);
    if(mid<=0) return null;
    return {reps: mid, repsLabel: a+"-"+b};
  }
  var single = parseInt(raw,10);
  if(!isNaN(single) && single>0 && /^\d+$/.test(raw)){
    return {reps: single, repsLabel: String(single)};
  }
  return null;
}

/* ---------- Cloud-sync: saveEx/saveLogs finder selv ændringer og skubber dem op ---------- */
function diffById(newList, oldList){
  var oldById = {};
  oldList.forEach(function(x){ oldById[x.id] = JSON.stringify(x); });
  var newIds = {};
  newList.forEach(function(x){ newIds[x.id] = true; });
  var upserts = newList.filter(function(x){ return oldById[x.id] !== JSON.stringify(x); });
  var dels = oldList.filter(function(x){ return !newIds[x.id]; }).map(function(x){ return x.id; });
  return { upserts: upserts, dels: dels };
}
function persistPendingSnapshot(){
  try{ localStorage.setItem(LS_PENDING, JSON.stringify({ex: memEx, logs: memLogs, t: Date.now()})); }catch(e){}
}
function pushChanges(table, changes, toRowFn){
  var ops = [];
  if(changes.upserts.length) ops.push(sb.from(table).upsert(changes.upserts.map(toRowFn)));
  if(changes.dels.length) ops.push(sb.from(table).delete().eq("user_id", session.user.id).in("id", changes.dels));
  if(!ops.length) return;
  Promise.all(ops).then(function(results){
    var bad = results.filter(function(r){ return r && r.error; });
    if(bad.length){
      persistPendingSnapshot();
      showToast("⚠ Kunne ikke gemme i skyen — prøver igen næste gang");
    }
  }).catch(function(){
    persistPendingSnapshot();
    showToast("⚠ Kunne ikke gemme i skyen — prøver igen næste gang");
  });
}
function saveEx(list){
  var changes = diffById(list, memEx);
  memEx = list;
  pushChanges("exercises", changes, exToRow);
}
function saveLogs(list){
  var changes = diffById(list, memLogs);
  memLogs = list;
  pushChanges("logs", changes, logToRow);
}

/* Hvis et cloud-gem fejlede tidligere, ligger der en nød-backup — skub den op igen */
function flushPendingSnapshot(){
  var raw = null;
  try{ raw = localStorage.getItem(LS_PENDING); }catch(e){}
  if(!raw) return Promise.resolve();
  var snap;
  try{ snap = JSON.parse(raw); }catch(e){ localStorage.removeItem(LS_PENDING); return Promise.resolve(); }
  return upsertChunks("exercises", (snap.ex||[]).map(exToRow))
    .then(function(){ return upsertChunks("logs", (snap.logs||[]).map(logToRow)); })
    .then(function(){ try{ localStorage.removeItem(LS_PENDING); }catch(e){} })
    .catch(function(){ /* stadig offline — prøver igen næste gang */ });
}
function upsertChunks(table, rows){
  var p = Promise.resolve();
  for(var i=0; i<rows.length; i+=200){
    (function(slice){
      p = p.then(function(){
        return sb.from(table).upsert(slice).then(function(res){
          if(res.error) throw res.error;
        });
      });
    })(rows.slice(i, i+200));
  }
  return p;
}

/* Hent ALLE rækker (PostgREST giver max 1000 ad gangen) */
function fetchAllRows(makeQuery){
  var all = [];
  var size = 1000;
  function page(n){
    return makeQuery().range(n*size, n*size+size-1).then(function(res){
      if(res.error) throw res.error;
      all = all.concat(res.data||[]);
      if(res.data && res.data.length===size) return page(n+1);
      return all;
    });
  }
  return page(0);
}

/* ---------------- Score / PR / trend helpers ---------------- */
function setScore(s){
  var w = s.weight || 0;
  var r = s.reps || 0;
  return w*1000 + r;
}
function sessionsForExercise(exId, bucketFilter, logsArr){
  var source = logsArr || loadLogs();
  var logs = source.filter(function(l){
    if(l.exerciseId!==exId) return false;
    if(bucketFilter){
      var mp = l.musclePos || "1-2";
      if(mp!==bucketFilter) return false;
    }
    return true;
  });
  var byDate = {};
  logs.forEach(function(l){
    if(!byDate[l.date]) byDate[l.date]=[];
    byDate[l.date].push(l);
  });
  var dates = Object.keys(byDate).sort(); // ascending
  return dates.map(function(d){
    var sets = byDate[d].sort(function(a,b){return a.setNumber-b.setNumber;});
    var tracked = sets.filter(function(s){return !s.skipped;});
    var top = tracked.length ? tracked.reduce(function(m,s){ return setScore(s)>setScore(m)?s:m; }, tracked[0]) : null;
    return {date:d, sets:sets, topSet:top, topScore: top ? setScore(top) : null};
  });
}
function allTimeBest(exId, logsArr){
  var sess = sessionsForExercise(exId, null, logsArr);
  var best = null;
  sess.forEach(function(s){
    if(s.topScore===null) return;
    if(!best || s.topScore>best.topScore) best = s;
  });
  return best;
}
function bestPerSetNumber(exId, logsArr){
  var source = logsArr || loadLogs();
  var logs = source.filter(function(l){return l.exerciseId===exId && !l.skipped;});
  var bySetNum = {};
  logs.forEach(function(l){
    var sn = l.setNumber;
    if(!bySetNum[sn] || setScore(l)>setScore(bySetNum[sn])) bySetNum[sn] = l;
  });
  return bySetNum;
}
function trendForSession(sessions, idx){
  if(sessions[idx].topScore===null) return null;
  var prevScore = null;
  for(var i=idx-1;i>=0;i--){
    if(sessions[i].topScore!==null){ prevScore = sessions[i].topScore; break; }
  }
  if(prevScore===null) return null;
  var cur = sessions[idx].topScore;
  if(cur>prevScore) return "up";
  if(cur<prevScore) return "down";
  return "same";
}
function trendArrow(t){
  if(t==="up") return '<span class="trend up">▲ Fremgang</span>';
  if(t==="down") return '<span class="trend down">▼ Tilbagegang</span>';
  if(t==="same") return '<span class="trend same">▬ Uændret</span>';
  return "";
}

/* ---------------- Tastatur + knap-tryk samtidig (iOS-fix) ----------------
   På iPhone kræver det normalt to separate tryk at (1) lukke tastaturet og
   (2) trykke på en knap bagved — første tryk bruges kun til at lukke
   tastaturet, og knappens "click" udløses aldrig.
   Tidligere forsøg: fjerne fokus globalt på "touchstart" for hele siden.
   Det viste sig at give en NY fejl (fx på login-siden): fordi det globale
   touchstart-tryk starter tastaturets luk-animation FØR selve trykket er
   færdigt, når layoutet nogle gange at flytte sig (feltet under fingeren
   ændrer position), så browseren tror man trykkede på et helt andet element
   (fx hoppede op i mail-feltet i stedet for at trykke "Log ind").
   Rigtig fix: brug "touchend" (ikke touchstart) PÅ SELVE KNAPPEN i stedet for
   et globalt lag. Touch-events er "låst" til det element man startede trykket
   på, uanset om layoutet flytter sig undervejs — så den rammer altid den
   rigtige knap. bindTapAction() bruges på knapper der sidder lige efter et
   tekstfelt (login, kommentar-send), og gør både luk-tastatur og selve
   knappens handling i ét og samme tryk. */
function bindTapAction(el, handler){
  var handledByTouch = false;
  el.addEventListener("touchend", function(e){
    handledByTouch = true;
    e.preventDefault();
    var ae = document.activeElement;
    if(ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA") && ae!==el) ae.blur();
    handler(e);
    setTimeout(function(){ handledByTouch = false; }, 500);
  }, {passive:false});
  el.addEventListener("click", function(e){
    if(handledByTouch) return; /* undgå at "click" (som følger efter touchend) udløser handleren igen */
    handler(e);
  });
}

    submitBtn.textContent = "Vent…";

    if(mode==="up"){
      var uname = document.getElementById("authUsername").value.trim().toLowerCase();
      if(!/^[a-z0-9æøå_.-]{2,20}$/.test(uname)){
        showToast("Brugernavn: 2-20 tegn, kun bogstaver/tal/._-");
        submitBtn.disabled = false; submitBtn.textContent = "Opret konto";
        return;
      }
      sb.auth.signUp({ email: email, password: password, options: { data: { username: uname } } }).then(function(res){
        if(res.error){
          var m = res.error.message||"";
          if(m.indexOf("already registered")!==-1) showToast("Der findes allerede en konto med den email");
          else showToast("Kunne ikke oprette konto: "+m);
          submitBtn.disabled = false; submitBtn.textContent = "Opret konto";
          return;
        }
        if(res.data && res.data.session){
          /* email-bekræftelse slået fra — direkte ind */
          session = res.data.session;
          bootAfterLogin();
        } else {
          renderLogin("sent", email);
        }
      });
    } else {
      sb.auth.signInWithPassword({ email: email, password: password }).then(function(res){
        if(res.error){
          var m = res.error.message||"";
          if(m.indexOf("Invalid login credentials")!==-1) showToast("Forkert email eller adgangskode");
          else if(m.indexOf("Email not confirmed")!==-1) showToast("Bekræft først din email — tjek din indbakke");
          else showToast("Kunne ikke logge ind: "+m);
          submitBtn.disabled = false; submitBtn.textContent = "Log ind";
          return;
        }
        session = res.data.session;
        bootAfterLogin();
      });
    }
  });
}

/* Sikr at der findes en profil-række (brugernavn + email) for kontoen */
function ensureProfile(){
  return sb.from("profiles").select("*").eq("id", session.user.id).maybeSingle().then(function(res){
    if(res.data){
      myProfile = res.data;
      /* backfill: ældre profiler mangler email-feltet */
      if(!myProfile.email && session.user.email){
        myProfile.email = session.user.email;
        sb.from("profiles").update({ email: session.user.email }).eq("id", session.user.id).then(function(){});
      }
      return true;
    }
    var uname = (session.user.user_metadata && session.user.user_metadata.username) || "";
    return tryInsertProfile(uname);
  });
}
function tryInsertProfile(uname){
  if(!/^[a-z0-9æøå_.-]{2,20}$/.test(uname)) return promptUsername(uname);
  return sb.from("profiles").insert({ id: session.user.id, username: uname, email: session.user.email||null }).then(function(res){
    if(res.error){
      if(String(res.error.code)==="23505") return promptUsername(uname); // optaget
      showToast("Kunne ikke gemme profil: "+(res.error.message||""));
      return promptUsername(uname);
    }
    myProfile = { id: session.user.id, username: uname, email: session.user.email||null };
    return true;
  });
}
function promptUsername(prev){
  return new Promise(function(resolve){
    /* Sikkerhedsnet: hvis modal'en lukkes uden at gemme, kan den åbnes igen */
    main.innerHTML = '<div class="empty-state" style="padding-top:60px;">Du mangler at vælge et brugernavn.</div>';
    var reopen = document.createElement("button");
    reopen.className = "btn primary";
    reopen.textContent = "Vælg brugernavn";
    reopen.style.marginTop = "10px";
    reopen.addEventListener("click", open);
    main.appendChild(reopen);
    function open(){
      var html = '<h3>Vælg brugernavn</h3>'+
        '<div class="muted" style="margin-bottom:12px;">'+(prev ? 'Brugernavnet "'+escapeHtml(prev)+'" er optaget eller ugyldigt — vælg et andet.' : 'Vælg det navn dine venner skal se.')+'</div>'+
        '<div class="field"><input type="text" id="unameInput" autocomplete="off" autocapitalize="off" placeholder="fx matteo"></div>'+
        '<button class="btn primary" id="unameSave">Gem</button>';
      openModal(html);
      bindTapAction(document.getElementById("unameSave"), function(){
        var u = document.getElementById("unameInput").value.trim().toLowerCase();
        if(!/^[a-z0-9æøå_.-]{2,20}$/.test(u)){ showToast("2-20 tegn, kun bogstaver/tal/._-"); return; }
        closeModal();
        tryInsertProfile(u).then(resolve);
      });
    }
    open();
  });
}

/* Hent egne øvelser + logs fra skyen */
function fetchOwnData(){
  return Promise.all([
    fetchAllRows(function(){ return sb.from("exercises").select("*").eq("user_id", session.user.id).order("id"); }),
    fetchAllRows(function(){ return sb.from("logs").select("*").eq("user_id", session.user.id).order("id"); })
  ]).then(function(results){
    memEx = results[0].map(rowToEx);
    memLogs = results[1].map(rowToLog);
  });
}

/* Engangs-flytning: Matteos gamle lokale data -> skyen (kun hans konto, kun hvis skyen er tom) */
function maybeMigrateLocalData(){
  if(!session.user.email || session.user.email.toLowerCase()!==MIGRATION_OWNER_EMAIL) return Promise.resolve();
  if(memEx.length>0 || memLogs.length>0) return Promise.resolve();
  var localEx = [], localLogs = [];
  try{ localEx = JSON.parse(localStorage.getItem(LS_EX))||[]; }catch(e){}
  try{ localLogs = JSON.parse(localStorage.getItem(LS_LOGS))||[]; }catch(e){}
  if(localEx.length===0) return Promise.resolve();
  renderLoadingScreen("Flytter dine data til skyen — vent et øjeblik…");
  memEx = localEx.map(function(e){ return {id:e.id, name:e.name, bodyweight:!!e.bodyweight, muscle:e.muscle||null}; });
  memLogs = localLogs.map(function(l){
    return {id:l.id, exerciseId:l.exerciseId, date:l.date, loggedAt:(l.loggedAt===undefined?null:l.loggedAt), setNumber:l.setNumber, weight:(l.weight===undefined?null:l.weight), reps:(l.reps===undefined?null:l.reps), repsLabel:(l.repsLabel===undefined||l.repsLabel===null?null:String(l.repsLabel)), musclePos:l.musclePos||"1-2", skipped:!!l.skipped};
  });
  return upsertChunks("exercises", memEx.map(exToRow))
    .then(function(){ return upsertChunks("logs", memLogs.map(logToRow)); })
    .then(function(){ showToast("✓ Dine gamle data er flyttet til skyen", 3000); })
    .catch(function(err){
      memEx = []; memLogs = [];
      showToast("⚠ Flytning fejlede — tjek internet og genstart appen", 4000);
    });
}

function detectColumns(){
  return sb.from("exercises").select("position").limit(1).then(function(res){
    HAS_POSITION_COL = !res.error;
  }).catch(function(){ HAS_POSITION_COL = false; });
}

function bootAfterLogin(){
  document.getElementById("menuBtn").style.display = "flex";
  document.getElementById("bottomNav").style.display = "flex";
  renderLoadingScreen("Henter dine data…");
  ensureProfile().then(function(){
    /* Nye brugere er ikke godkendt endnu (approved=false som standard) — bloker
       adgang til appen indtil MASTER MATTEO har accepteret dem manuelt. */
    if(myProfile && myProfile.approved===false && !isAdminAccount()){
      renderPendingApproval();
      return Promise.reject({__pendingApproval:true});
    }
    return detectColumns();
  }).then(function(){
    return flushPendingSnapshot();
  }).then(function(){
    return fetchOwnData();
  }).then(function(){
    return maybeMigrateLocalData();
  }).then(function(){
    return maybeSeedCatalog();
  }).then(function(){
    maybeFixEzbarStartdata();
    maybeMigrateVariants();
    updateMenuActive();
    /* Åbn "Log øvelse" hvis der er logget et sæt inden for de sidste 30 min
       (undgår at skulle navigere derhen igen mellem sæt), ellers Feed. */
    goto(hasRecentOwnActivity() ? "log" : "feed");
  }).catch(function(err){
    if(err && err.__pendingApproval) return; /* allerede vist ventesiden, ikke en fejl */
    renderLoadingScreen("Kunne ikke hente data — tjek din internetforbindelse og prøv igen.");
    var retry = document.createElement("button");
    retry.className = "btn primary";
    retry.style.marginTop = "16px";
    retry.textContent = "Prøv igen";
    retry.addEventListener("click", bootAfterLogin);
    main.appendChild(retry);
  });
}

function attachVariantToggle(toggleId, initial, onChange){
  var box = document.getElementById(toggleId);

  box.querySelectorAll(".toggle-opt").forEach(function(opt){
    opt.addEventListener("click", function(){
      var v = opt.getAttribute("data-var");

        current = null; /* tryk igen = fravælg */

      } else {
        current = v;

      }
      onChange(current);

function prevSetWeightToday(exId, setNum){
  if(setNum<=1) return null;
  var todays = loadLogs().filter(function(l){return l.exerciseId===exId && l.date===todayISO();});
  var prev = todays.find(function(l){return l.setNumber===setNum-1;});
  if(!prev || prev.weight===null || prev.weight===undefined) return null;
  return prev.weight;
}

function nextSetNumberForToday(exId){
  var todays = loadLogs().filter(function(l){return l.exerciseId===exId && l.date===todayISO();});
  return todays.length+1;
}

function getTodayDayContext(){
  var todayLogs = loadLogs().filter(function(l){ return l.date===todayISO(); });
  if(todayLogs.length===0) return null;
  var exList = loadEx();
  for(var i=0;i<todayLogs.length;i++){
    var exObj = exList.find(function(e){ return e.id===todayLogs[i].exerciseId; });
    if(exObj && exObj.muscle){
      var day = dayGroupForMuscle(exObj.muscle);
      if(day) return day;
    }
  }
  return null;
}

function getSuggestedExercises(){
  var day = getTodayDayContext();
  if(!day) return [];
  var todayLoggedIds = {};
  loadLogs().filter(function(l){return l.date===todayISO();}).forEach(function(l){ todayLoggedIds[l.exerciseId]=true; });
  return loadEx().filter(function(e){
    return e.muscle && dayGroupForMuscle(e.muscle)===day && !todayLoggedIds[e.id];
  });
}

      if(e.id!==exId) return e;
      return {id:e.id, name:newName, bodyweight: bwVal===1, muscle: muscle, variant: variantVal};
    });
    saveEx(list);
    closeModal();

    if(onSaved) onSaved();
  });
}

function attachLogFormHandlers(){
  var weightInput = document.getElementById("logWeight");
  if(weightInput){
    weightInput.addEventListener("focus", function(){ weightInput.select(); });
  }

  var clearBtn = document.getElementById("clearExBtn");
  if(clearBtn) clearBtn.addEventListener("click", function(){ logDraft.exerciseId=null; logDraft.musclePos="1-2"; logDraft.repsMode="wheel"; logDraft.wheelValue=8; logDraft.textValue=""; renderLog(); });

  var renameBtn = document.getElementById("renameExBtn");
  if(renameBtn){
    renameBtn.addEventListener("click", function(){
      openEditExerciseModal(logDraft.exerciseId, function(){ renderLog(); });
    });
  }

  var musclePosToggle = document.getElementById("musclePosToggle");
  if(musclePosToggle){
    musclePosToggle.querySelectorAll(".toggle-opt").forEach(function(opt){
      opt.addEventListener("click", function(){
        musclePosToggle.querySelectorAll(".toggle-opt").forEach(function(o){o.classList.remove("selected");});
        opt.classList.add("selected");
        logDraft.musclePos = opt.getAttribute("data-mp");
      });
    });
  }

  var repsPicker = document.getElementById("repsPicker");
  if(repsPicker){
    var repsItems = repsPicker.querySelectorAll(".reps-item");
    var itemWidth = 56;
    function highlightIdx(idx){
      repsItems.forEach(function(it){ it.classList.remove("active"); });
      if(repsItems[idx]) repsItems[idx].classList.add("active");
    }
    var initialIdx = Math.max(0, Math.min(repsItems.length-1, logDraft.wheelValue-1));
    repsPicker.scrollLeft = initialIdx*itemWidth;
    highlightIdx(initialIdx);
    var scrollTimer;
    repsPicker.addEventListener("scroll", function(){
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(function(){
        var idx = Math.round(repsPicker.scrollLeft/itemWidth);
        idx = Math.max(0, Math.min(repsItems.length-1, idx));
        highlightIdx(idx);
        logDraft.wheelValue = parseInt(repsItems[idx].getAttribute("data-val"),10);
      }, 90);
    });
  }

  var repsModeToggle = document.getElementById("repsModeToggle");
  if(repsModeToggle){
    repsModeToggle.addEventListener("click", function(){
      if(logDraft.repsMode==="text"){
        logDraft.textValue = document.getElementById("logReps").value;
        logDraft.repsMode = "wheel";
      } else {
        logDraft.repsMode = "text";
      }
      renderLog();
    });
  }

  var saveBtn = document.getElementById("saveSetBtn");
  if(saveBtn){
    bindTapAction(saveBtn, function(){
      var exObj = getExerciseById(logDraft.exerciseId);
      var weightRaw = document.getElementById("logWeight").value;
      var parsedReps;
      if(logDraft.repsMode==="text"){
        parsedReps = parseReps(document.getElementById("logReps").value);
      } else {
        parsedReps = { reps: logDraft.wheelValue, repsLabel: String(logDraft.wheelValue) };
      }
      if(!parsedReps){ showToast("Udfyld reps (fx 8 eller 7-9)"); return; }
      var weight = parseWeight(weightRaw);
      if(exObj.bodyweight){ weight = weight===null? 0 : weight; }
      else {
        if(weight===null){ showToast("Udfyld vægt"); return; }
      }
      var prevBest = allTimeBest(exObj.id);
      var logs = loadLogs().slice();
      var setNum = nextSetNumberForToday(exObj.id);
      var newLog = {
        id: uid("log"),
        exerciseId: exObj.id,
        date: todayISO(),
        loggedAt: Date.now(),
        setNumber: setNum,
        weight: weight,
        reps: parsedReps.reps,
        repsLabel: parsedReps.repsLabel,
        musclePos: logDraft.musclePos || "1-2",
        skipped: false
      };
      logs.push(newLog);
      saveLogs(logs);

      var newScore = setScore(newLog);
      var isPR = !prevBest || newScore > prevBest.topScore;

      if(isPR){
        showToast("🏆 Ny PR på "+exObj.name+"!", null, "pr");
      } else {
        showToast("Sæt "+setNum+" gemt ✓");
      }
      renderLog();
    });
  }

  var skipBtn = document.getElementById("skipSetBtn");
  if(skipBtn){
    skipBtn.addEventListener("click", function(){
      var exObj = getExerciseById(logDraft.exerciseId);
      var logs = loadLogs().slice();
      var setNum = nextSetNumberForToday(exObj.id);
      var newLog = {
        id: uid("log"),
        exerciseId: exObj.id,
        date: todayISO(),
        loggedAt: Date.now(),
        setNumber: setNum,
        weight: null,
        reps: null,
        repsLabel: "–",
        musclePos: logDraft.musclePos || "1-2",
        skipped: true
      };
      logs.push(newLog);
      saveLogs(logs);
      showToast("Sæt "+setNum+" sprunget over");
      renderLog();
    });
  }
}

/* =========================================================
   VIEW: HISTORY LIST (egne øvelser)
   ========================================================= */
function renderHistoryList(){
  state.viewUser = null;
  var ex = loadEx();
  var logs = loadLogs();
  var loggedIds = {};
  logs.forEach(function(l){loggedIds[l.exerciseId]=true;});

  var lastDateFor = {};
  var lastLoggedAtFor = {};
  ex.forEach(function(e){
    if(!loggedIds[e.id]) return;
    var sess = sessionsForExercise(e.id);
    lastDateFor[e.id] = sess.length ? sess[sess.length-1].date : "";
    var maxAt = 0;
    logs.forEach(function(l){ if(l.exerciseId===e.id && l.loggedAt && l.loggedAt>maxAt) maxAt = l.loggedAt; });
    lastLoggedAtFor[e.id] = maxAt;
  });
  ex = ex.slice().sort(function(a,b){
    var da = lastDateFor[a.id] || "";
    var db = lastDateFor[b.id] || "";
    if(da!==db) return da < db ? 1 : -1; // most recently logged first
    var ta = lastLoggedAtFor[a.id] || 0;
    var tb = lastLoggedAtFor[b.id] || 0;
    if(ta!==tb) return ta < tb ? 1 : -1; // same day: most recently logged (by time) first
    return a.name.localeCompare(b.name);
  });

  var html = '<h2 class="section">Historik/Statistik</h2>';
  html += '<div class="card"><div class="search-wrap"><input type="text" id="histSearch" placeholder="Søg efter øvelse..." autocomplete="off"></div></div>';
  html += '<div class="card" id="histList" style="padding:0;"></div>';
  main.innerHTML = html;

  function draw(filterQ){
    var q = (filterQ||"").toLowerCase();
    var list = ex.filter(function(e){ return loggedIds[e.id] && (!q || e.name.toLowerCase().indexOf(q)!==-1); });
    var box = document.getElementById("histList");
    if(list.length===0){
      box.innerHTML = '<div class="empty-state">Ingen loggede øvelser endnu'+(q?" for søgningen":"")+'.</div>';
      return;
    }
    var out = "";
    list.forEach(function(e){
      var sess = sessionsForExercise(e.id);
      var last = sess[sess.length-1];
      out += '<div class="list-row" data-id="'+e.id+'"><div><div class="name">'+escapeHtml(e.name)+'</div><div class="muted">Sidst logget: '+fmtDateDisplay(last.date)+'</div></div><div class="chev">›</div></div>';
    });
    box.innerHTML = out;
    box.querySelectorAll(".list-row").forEach(function(row){
      row.addEventListener("click", function(){
        goto("exerciseHistory", {selectedExerciseId: row.getAttribute("data-id"), viewUser: null, histBack:"history"});
      });
    });
  }
  draw("");
  document.getElementById("histSearch").addEventListener("input", function(e){ draw(e.target.value); });
}

function renderGraphSVG(sessionsAll, bodyweight){
  var sessions = sessionsAll.filter(function(s){ return s.topSet!==null; });
  if(sessions.length===0){
    return '<div class="empty-state">Ingen sporede sæt endnu til graf.</div>';
  }
  var w = 480, h = 160, padL=34, padR=14, padT=16, padB=26;
  var values = sessions.map(function(s){
    return bodyweight ? s.topSet.reps : (s.topSet.weight||0);
  });
  var maxV = Math.max.apply(null, values);
  var minV = Math.min.apply(null, values);
  if(maxV===minV){ maxV = maxV+1; minV = Math.max(0,minV-1); }
  var n = sessions.length;
  function x(i){ return n<=1 ? padL : padL + (i*(w-padL-padR)/(n-1)); }
  function y(v){ return padT + (h-padT-padB) * (1 - (v-minV)/(maxV-minV)); }

  var points = values.map(function(v,i){ return x(i)+","+y(v); }).join(" ");
  var circles = "";
  values.forEach(function(v,i){
    circles += '<circle cx="'+x(i)+'" cy="'+y(v)+'" r="4" fill="var(--yellow)" stroke="#101012" stroke-width="1.5"></circle>';
  });
  var labelUnit = bodyweight ? " reps" : " kg";
  var svg = '<svg class="graph" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">';
  svg += '<line x1="'+padL+'" y1="'+(h-padB)+'" x2="'+(w-padR)+'" y2="'+(h-padB)+'" stroke="#2e2e33" stroke-width="1"/>';
  svg += '<text x="4" y="'+(y(maxV)+4)+'" fill="#9a9aa2" font-size="10">'+Math.round(maxV)+labelUnit+'</text>';
  svg += '<text x="4" y="'+(y(minV)+4)+'" fill="#9a9aa2" font-size="10">'+Math.round(minV)+labelUnit+'</text>';
  svg += '<polyline points="'+points+'" fill="none" stroke="#f5c518" stroke-width="2.5"/>';
  svg += circles;
  svg += '</svg>';
  return svg;
}

/* =========================================================
   VIEW: ØVELSER (grupperet efter muskel, med Liste A/B)

function variantHas(e, letter){
  return String(e.variant||"").indexOf(letter)!==-1;
}

function renderExercisesPage(){
  state.viewUser = null;
  var ex = loadEx();
  var html = '<h2 class="section">Øvelser</h2>';
  html += '<button class="btn" id="addExBtn" style="margin-bottom:6px;">＋ Tilføj ny øvelse</button>';
  html += '<div class="muted" style="margin-bottom:10px;text-align:center;">Hold en øvelse inde og træk den op/ned for at ændre rækkefølgen i en liste.</div>';

  function sortInGroup(arr, grp){
    return arr.slice().sort(function(a,b){
      var pa = (a.position===null||a.position===undefined) ? Infinity : a.position;
      var pb = (b.position===null||b.position===undefined) ? Infinity : b.position;
      if(pa!==pb) return pa-pb;
      var ma = grp.muscles.indexOf(a.muscle), mb = grp.muscles.indexOf(b.muscle);
      if(ma!==mb) return ma-mb;
      return a.name.localeCompare(b.name);
    });
  }
  function listHtml(arr, grp){
    if(arr.length===0) return '<div class="card" style="margin-top:0;margin-bottom:16px;"><div class="muted" style="text-align:center;">(tom — tryk Rediger for at tilføje øvelser)</div></div>';
    var out = '<div class="card reorder-list" style="padding:0;margin-top:0;margin-bottom:16px;">';
    sortInGroup(arr, grp).forEach(function(e){
      out += '<div class="list-row" data-exid="'+e.id+'"><div><div class="name">'+escapeHtml(e.name)+'</div><div class="muted">'+(MUSCLE_LABELS[e.muscle]||"")+(e.bodyweight?' · Kropsvægt':'')+'</div></div><div class="chev">≡&nbsp;&nbsp;›</div></div>';
    });
    out += '</div>';
    return out;
  }
  function listHeader(label, grpIdx, letter){
    return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div class="train-tag" style="margin-bottom:0;">'+label+'</div><button class="pill-btn dim" data-editlist="'+letter+'" data-group="'+grpIdx+'">Rediger</button></div>';
  }

  /* Nye/ukategoriserede øvelser øverst */
  var uncategorized = ex.filter(function(e){ return !e.muscle; }).sort(function(a,b){ return a.name.localeCompare(b.name); });
  if(uncategorized.length){
    html += '<div class="train-tag" style="background:var(--red);color:#fff;">Ikke kategoriseret</div>';
    html += '<div class="muted" style="margin-bottom:8px;">Tryk på en øvelse for at vælge muskelgruppe og liste.</div>';
    html += '<div class="card" style="padding:0;margin-top:0;margin-bottom:16px;">';
    uncategorized.forEach(function(e){
      html += '<div class="list-row" data-catid="'+e.id+'"><div><div class="name">'+escapeHtml(e.name)+'</div><div class="muted">'+(e.bodyweight?'Kropsvægt · ':'')+'Mangler kategori</div></div><div class="pill-btn" style="pointer-events:none;">Kategorisér</div></div>';
    });
    html += '</div>';
  }

  MUSCLE_GROUPS_BY_DAY.forEach(function(grp, grpIdx){
    var inGroup = ex.filter(function(e){ return e.muscle && grp.muscles.indexOf(e.muscle)!==-1; });
    if(inGroup.length===0) return;
    html += '<h2 class="section">'+escapeHtml(grp.title)+'</h2>';
    var listA = inGroup.filter(function(e){ return variantHas(e,"a"); });
    var listB = inGroup.filter(function(e){ return variantHas(e,"b"); });
    var listC = inGroup.filter(function(e){ return !variantHas(e,"a") && !variantHas(e,"b"); });
    html += listHeader("Liste A", grpIdx, "a");
    html += listHtml(listA, grp);
    html += listHeader("Liste B", grpIdx, "b");
    html += listHtml(listB, grp);
    if(listC.length){
      html += '<div class="train-tag" style="background:var(--bg-elevated);color:var(--text-dim);">Liste C — øvrige</div>';
      html += listHtml(listC, grp);
    }
  });

  if(ex.length===0){
    html += '<div class="card"><div class="empty-state">Ingen øvelser endnu — tilføj din første! 💪</div></div>';
  }

  main.innerHTML = html;
  document.getElementById("addExBtn").addEventListener("click", function(){ openAddExerciseModal(""); });
  main.querySelectorAll("[data-exid]").forEach(function(row){
    row.addEventListener("click", function(){
      if(Date.now() - lastReorderEnd < 500) return; /* var et træk, ikke et tryk */
      goto("exerciseHistory", {selectedExerciseId: row.getAttribute("data-exid"), viewUser:null, histBack:"exercises"});
    });
  });
  main.querySelectorAll(".reorder-list").forEach(function(cont){ attachListReorder(cont); });
  main.querySelectorAll("[data-catid]").forEach(function(row){
    row.addEventListener("click", function(){

/* ---------- Træk-og-slip rækkefølge i en liste ---------- */
var lastReorderEnd = 0;

function persistListOrder(orderedIds){
  var posById = {};
  orderedIds.forEach(function(id, i){ posById[id] = i+1; });
  var changed = false;
  var list = loadEx().map(function(e){
    if(posById[e.id]!==undefined && e.position!==posById[e.id]){
      changed = true;
      return Object.assign({}, e, {position: posById[e.id]});
    }
    return e;
  });
  if(changed){
    saveEx(list);
    showToast("Rækkefølge gemt ✓");
  }
}

function attachListReorder(container){
  var pressTimer = null;
  var dragging = null;
  var startY = 0;

  function rowsOf(){ return Array.prototype.slice.call(container.querySelectorAll(".list-row[data-exid]")); }
  function pointY(e){ return (e.touches && e.touches.length) ? e.touches[0].clientY : e.clientY; }

  function startDrag(row){
    dragging = row;
    row.classList.add("dragging");
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
    document.addEventListener("touchmove", onMove, {passive:false});
    document.addEventListener("touchend", onUp);
  }
  function stopListeners(){
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
    document.removeEventListener("touchmove", onMove, {passive:false});
    document.removeEventListener("touchend", onUp);
  }
  function onMove(e){
    if(!dragging) return;
    if(e.cancelable) e.preventDefault(); /* stop siden i at scrolle imens */
    var y = pointY(e);
    rowsOf().forEach(function(other){
      if(other===dragging) return;
      var r = other.getBoundingClientRect();
      var mid = r.top + r.height/2;
      var dRect = dragging.getBoundingClientRect();
      if(y < mid && dRect.top > r.top){
        container.insertBefore(dragging, other);
      } else if(y > mid && dRect.top < r.top){
        container.insertBefore(dragging, other.nextSibling);
      }
    });
  }
  function onUp(){
    if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
    if(!dragging) return;
    dragging.classList.remove("dragging");
    dragging = null;
    stopListeners();
    lastReorderEnd = Date.now();
    persistListOrder(rowsOf().map(function(r){ return r.getAttribute("data-exid"); }));
  }
  function onDown(e){
    var row = e.target && e.target.closest ? e.target.closest(".list-row[data-exid]") : null;
    if(!row || row.parentNode!==container) return;
    startY = pointY(e);
    clearTimeout(pressTimer);
    pressTimer = setTimeout(function(){ startDrag(row); }, 350);
    /* fortryd langt tryk hvis man begynder at scrolle inden tiden er gået */
    var cancelMove = function(ev){
      if(dragging) return;
      if(Math.abs(pointY(ev)-startY) > 12 && pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
    };
    var cancelUp = function(){
      if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; }
      document.removeEventListener("mousemove", cancelMove);
      document.removeEventListener("touchmove", cancelMove);
      document.removeEventListener("mouseup", cancelUp);
      document.removeEventListener("touchend", cancelUp);
      if(dragging) onUp();
    };
    document.addEventListener("mousemove", cancelMove);
    document.addEventListener("touchmove", cancelMove);
    document.addEventListener("mouseup", cancelUp);
    document.addEventListener("touchend", cancelUp);
  }
  container.addEventListener("mousedown", onDown);
  container.addEventListener("touchstart", onDown, {passive:true});
}

/* Redigér hvilke øvelser der er med i Liste A eller B for en muskelgruppe */
function openEditListModal(grpIdx, letter){
  var grp = MUSCLE_GROUPS_BY_DAY[grpIdx];
  if(!grp) return;
  var inGroup = loadEx().filter(function(e){ return e.muscle && grp.muscles.indexOf(e.muscle)!==-1; })
    .sort(function(a,b){
      var ma = grp.muscles.indexOf(a.muscle), mb = grp.muscles.indexOf(b.muscle);
      if(ma!==mb) return ma-mb;
      return a.name.localeCompare(b.name);
    });
  var checked = {};
  inGroup.forEach(function(e){ checked[e.id] = variantHas(e, letter); });

  var html = '<h3>Liste '+letter.toUpperCase()+' — '+escapeHtml(grp.title)+'</h3>';
  html += '<div class="muted" style="margin-bottom:12px;">Vælg hvilke øvelser der skal være på listen. Øvelser uden liste ligger i Liste C.</div>';
  html += '<div class="search-results" style="margin-bottom:14px;">';

    html += '<div class="search-result-item" data-chk="'+e.id+'"><span>'+escapeHtml(e.name)+' <span class="muted">('+(MUSCLE_LABELS[e.muscle]||"")+')</span></span><span style="font-size:18px;font-weight:800;color:var(--yellow);" id="chk_'+e.id+'">'+(checked[e.id]?"☑":"☐")+'</span></div>';
  });
  html += '</div>';
  html += '<button class="btn primary" id="saveListBtn">Gem liste</button>';
  openModal(html);

  modalSheet.querySelectorAll("[data-chk]").forEach(function(row){
    row.addEventListener("click", function(){
      var id = row.getAttribute("data-chk");
      checked[id] = !checked[id];
      document.getElementById("chk_"+id).textContent = checked[id] ? "☑" : "☐";
    });
  });
  document.getElementById("saveListBtn").addEventListener("click", function(){
    var list = loadEx().map(function(e){
      if(!e.muscle || grp.muscles.indexOf(e.muscle)===-1) return e;
      var letters = String(e.variant||"").replace(letter, "");
      if(checked[e.id]) letters += letter;
      /* normalisér rækkefølgen a før b */
      var norm = (letters.indexOf("a")!==-1?"a":"") + (letters.indexOf("b")!==-1?"b":"");
      var newVariant = norm || null;
      if(newVariant===(e.variant||null)) return e;
      return Object.assign({}, e, {variant: newVariant});
    });
    saveEx(list);
    closeModal();
    showToast("Liste "+letter.toUpperCase()+" opdateret ✓");
    renderExercisesPage();
  });
}

   ========================================================= */
var MONTH_NAMES = ["januar","februar","marts","april","maj","juni","juli","august","september","oktober","november","december"];

function trainedDateSet(logs){
  var set = {};
  logs.forEach(function(l){ if(l.date) set[l.date] = true; });
  return set;
}
function pad2(n){ return (n<10?"0":"")+n; }
function isoOf(y,m,d){ return y+"-"+pad2(m+1)+"-"+pad2(d); }

function streakStats(trainedSet){
  var dates = Object.keys(trainedSet).sort();
  var best = 0, cur = 0, prevMs = null;
  var DAY = 86400000;
  dates.forEach(function(d){
    var ms = Date.parse(d+"T00:00:00Z");
    if(prevMs!==null && ms - prevMs === DAY) cur += 1;
    else cur = 1;
    if(cur>best) best = cur;
    prevMs = ms;
  });
  /* nuværende streak: dage i træk til og med i dag (eller i går, hvis dagens træning ikke er logget endnu) */
  var current = 0;
  var t = Date.parse(todayISO()+"T00:00:00Z");
  if(!trainedSet[todayISO()]) t -= DAY;
  while(trainedSet[new Date(t).toISOString().slice(0,10)]){
    current += 1;
    t -= DAY;
  }
  return { best: best, current: current };
}

function calendarGridHtml(y, m, trainedSet){
  var first = new Date(Date.UTC(y, m, 1));
  var startBlank = (first.getUTCDay()+6)%7; /* mandag først */
  var daysInMonth = new Date(Date.UTC(y, m+1, 0)).getUTCDate();
  var today = todayISO();
  var html = '<div class="cal-grid">';
  ["M","T","O","T","F","L","S"].forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });
  for(var i=0;i<startBlank;i++) html += '<div class="cal-day out"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var iso = isoOf(y,m,d);
    var cls = "cal-day";
    if(trainedSet[iso]) cls += " trained";
    if(iso===today) cls += " today";
    html += '<div class="'+cls+'"'+(trainedSet[iso]?' data-caldate="'+iso+'"':'')+'>'+d+'</div>';
  }
  html += '</div>';
  return html;
}
function monthTrainedCount(trainedSet, y, m){
  var prefix = y+"-"+pad2(m+1);
  return Object.keys(trainedSet).filter(function(d){ return d.indexOf(prefix)===0; }).length;
}

/* Detaljer for én dag: hvad blev der logget */
function dayDetailHtml(dateIso, logs, exList){
  var dayLogs = logs.filter(function(l){ return l.date===dateIso; });
  if(dayLogs.length===0) return "";
  var byEx = {}, order = [];
  dayLogs.forEach(function(l){
    if(!byEx[l.exerciseId]){ byEx[l.exerciseId]=[]; order.push(l.exerciseId); }
    byEx[l.exerciseId].push(l);
  });
  var html = '<div class="card"><div style="font-weight:800;margin-bottom:8px;">'+fmtDateDisplay(dateIso)+'</div>';
  order.forEach(function(exId){
    var e = exList.find(function(x){ return x.id===exId; }) || {name:"(slettet øvelse)", bodyweight:false};
    var sets = byEx[exId].slice().sort(function(a,b){ return (a.setNumber||0)-(b.setNumber||0); });
    var tracked = sets.filter(function(s){ return !s.skipped; });
    var setsTxt = tracked.length ? tracked.map(function(s){ return formatSetShort(s, e.bodyweight); }).join(", ") : "sprunget over";
    html += '<div class="feed-ex-line"><div class="feed-ex-name">'+escapeHtml(e.name)+'</div><div class="feed-ex-sets">'+escapeHtml(setsTxt)+'</div></div>';
  });
  html += '</div>';
  return html;
}

/* =========================================================
   VIEW: WINS & PLATEAUS
   ========================================================= */
function computeProgressRanking(){
  var exList = loadEx();
  var results = [];
  exList.forEach(function(ex){
    var sessions = sessionsForExercise(ex.id).filter(function(s){ return s.topScore!==null; });
    var n = sessions.length;
    if(n<2) return; // brug for mindst 2 træningsgange for at kunne sammenligne
    var windowSessions = sessions.slice(Math.max(0, n-10));
    var wn = windowSessions.length;
    var groupSize = Math.max(1, Math.min(3, Math.floor(wn/2)));
    var earlyGroup = windowSessions.slice(0, groupSize);
    var lateGroup = windowSessions.slice(wn-groupSize);
    var earlyAvg = earlyGroup.reduce(function(sum,s){return sum+s.topScore;},0) / earlyGroup.length;
    var lateAvg = lateGroup.reduce(function(sum,s){return sum+s.topScore;},0) / lateGroup.length;
    var pct = earlyAvg>0 ? ((lateAvg-earlyAvg)/earlyAvg)*100 : 0;
    results.push({
      exerciseId: ex.id,
      name: ex.name,
      bodyweight: ex.bodyweight,
      pct: pct,
      earlyTopSet: earlyGroup[earlyGroup.length-1].topSet,
      lateTopSet: lateGroup[lateGroup.length-1].topSet,
      sessionsUsed: wn
    });
  });
  var sorted = results.slice().sort(function(a,b){ return b.pct-a.pct; });
  var wins = sorted.slice(0,5);
  var plateaus = sorted.slice().sort(function(a,b){ return a.pct-b.pct; }).slice(0,5);
  return { wins: wins, plateaus: plateaus };
}

function formatSetShort(set, bodyweight){
  if(bodyweight){
    return (set.weight? ("+"+set.weight+"kg") : "kropsvægt")+"×"+(set.repsLabel||set.reps);
  }
  return set.weight+"kg×"+(set.repsLabel||set.reps);
}

function renderRankingRow(item){
  var sign = item.pct>0 ? "+" : "";
  var colorClass = item.pct > 2 ? "up" : (item.pct < -2 ? "down" : "same");
  var html = '<div class="list-row" data-exid="'+item.exerciseId+'" style="cursor:pointer;">';
  html += '<div><div class="name">'+escapeHtml(item.name)+'</div>';
  html += '<div class="muted">'+formatSetShort(item.earlyTopSet, item.bodyweight)+' → '+formatSetShort(item.lateTopSet, item.bodyweight)+' · '+item.sessionsUsed+' gange</div>';
  html += '</div><div class="trend '+colorClass+'" style="font-weight:800;">'+sign+item.pct.toFixed(0)+'%</div>';
  html += '</div>';
  return html;
}

/* ---------------- Utils ---------------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

/* =========================================================
   TRÆNINGS-GRUPPERING (30 min uden logs = træning slut)
   ========================================================= */
var WORKOUT_GAP_MS = 30*60*1000;

function effectiveTime(l){
  return (l.loggedAt!==null && l.loggedAt!==undefined) ? l.loggedAt : Date.parse(l.date+"T12:00:00Z");
}

/* Har jeg selv logget et sæt inden for de sidste 30 min? Bruges til at vælge
   standard-side ved appstart (Log øvelse hvis i gang, ellers Feed). */
function hasRecentOwnActivity(){
  if(!memLogs.length) return false;
  var latest = -Infinity;
  memLogs.forEach(function(l){ var t = effectiveTime(l); if(t>latest) latest = t; });
  return (Date.now() - latest) < WORKOUT_GAP_MS;
}

function groupWorkouts(logs){
  var sorted = logs.slice().sort(function(a,b){ return effectiveTime(a)-effectiveTime(b); });
  var workouts = [];
  var cur = null;
  sorted.forEach(function(l){
    var t = effectiveTime(l);
    if(!cur || t - cur.end > WORKOUT_GAP_MS){
      cur = { start:t, end:t, logs:[] };
      workouts.push(cur);
    }
    cur.logs.push(l);
    cur.end = t;
  });
  return workouts;
}

/* Byg feed-venlige workout-objekter for én bruger, inkl. PR-markering.
   PR = bedste sæt i træningen slår brugerens hidtil bedste for øvelsen (før træningen). */
function buildUserWorkouts(userId, userLogs, exById){
  var workouts = groupWorkouts(userLogs);
  var bestSoFar = {}; // exerciseId -> score
  var out = [];
  workouts.forEach(function(w){
    var byEx = {};
    var orderEx = [];
    w.logs.forEach(function(l){
      if(!byEx[l.exerciseId]){ byEx[l.exerciseId] = []; orderEx.push(l.exerciseId); }
      byEx[l.exerciseId].push(l);
    });
    var exSummaries = orderEx.map(function(exId){
      var sets = byEx[exId].slice().sort(function(a,b){ return (a.setNumber||0)-(b.setNumber||0); });
      var tracked = sets.filter(function(s){ return !s.skipped; });
      var topScore = tracked.length ? Math.max.apply(null, tracked.map(setScore)) : null;
      var prevBest = bestSoFar[exId];
      var isPR = topScore!==null && prevBest!==undefined && topScore > prevBest;
      if(topScore!==null && (prevBest===undefined || topScore > prevBest)) bestSoFar[exId] = topScore;
      var exObj = exById[exId] || { id:exId, name:"(slettet øvelse)", bodyweight:false, muscle:null };
      return { exId:exId, name:exObj.name, bodyweight:!!exObj.bodyweight, muscle:exObj.muscle||null, sets:sets, tracked:tracked, isPR:isPR };
    });
    out.push({ userId:userId, start:w.start, end:w.end, exercises:exSummaries, setCount:w.logs.length });
  });
  return out;
}
